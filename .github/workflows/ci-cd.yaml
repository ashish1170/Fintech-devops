name: ci-cd

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/**"
      - "argocd/**"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: us-east-1
  BACKEND_REPOSITORY: fintech-backend
  FRONTEND_REPOSITORY: fintech-frontend

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    concurrency:
      group: fintech-prod-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test backend
        working-directory: backend
        run: |
          npm install
          npm test

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          docker build -t "${REGISTRY}/${BACKEND_REPOSITORY}:${SHORT_SHA}" backend
          docker build -t "${REGISTRY}/${FRONTEND_REPOSITORY}:${SHORT_SHA}" frontend

          docker push "${REGISTRY}/${BACKEND_REPOSITORY}:${SHORT_SHA}"
          docker push "${REGISTRY}/${FRONTEND_REPOSITORY}:${SHORT_SHA}"

          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"

      - name: Update Kubernetes manifests for Argo CD
        run: |
          sed -i "s|image: .*fintech-backend:.*|image: ${REGISTRY}/${BACKEND_REPOSITORY}:${SHORT_SHA}|" k8s/backend-deployment.yaml
          sed -i "s|image: .*fintech-frontend:.*|image: ${REGISTRY}/${FRONTEND_REPOSITORY}:${SHORT_SHA}|" k8s/frontend-deployment.yaml

      - name: Commit manifest update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add k8s/backend-deployment.yaml k8s/frontend-deployment.yaml
          git commit -m "Deploy image ${SHORT_SHA}" || exit 0
          git push
